{% extends "base.html" %}

{% block title %}Exam Setup{% endblock %}

{% block body %}

{% include "_sidebar.html" %}

<div class="main">

    <div class="page-header">
        <a href="/dashboard" class="back" style="display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted); font-size:13px; margin-bottom:16px;"><i class="fa-solid fa-arrow-left"></i> Back to dashboard</a>
        <h1>📝 Create Your Exam</h1>
        <p>Select how you want to generate questions</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
    </div>
    {% endif %}

    <div
        style="
            display:grid;
            grid-template-columns:minmax(auto, 600px);
            justify-content:center;
            gap:24px;
        "
    >
        <!-- AI GENERATED EXAM -->
        <div class="panel">

            <div class="panel-title">
                <i class="fa-solid fa-robot"></i>
                AI Generated Exam
            </div>

            <form method="POST" action="/ai_exam">

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" name="subject" placeholder="Example: Computer Science" required>
                </div>

                <div class="form-group">

                    <label>Topic</label>

                    <input
                        type="text"
                        name="topic"
                        placeholder="Example: Operating System"
                        required
                    >

                </div>

                <div class="form-group">

                    <label>Number of Questions</label>

                    <input
                        type="number"
                        name="count"
                        min="1"
                        max="20"
                        required
                    >

                </div>

                <div class="form-group">
                    <label>Exam Duration (minutes)</label>
                    <input
                        type="number"
                        name="duration"
                        min="1"
                        max="180"
                        value="10"
                        required
                    >
                </div>

                <div class="form-group">

                    <label>Difficulty Level</label>

                    <select
                        name="difficulty"
                        required
                        style="width: 100%; padding: 12px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); outline: none; font-family: 'DM Sans', sans-serif;"
                    >
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>

                </div>

                <div class="form-group">

                    <label>Question Type</label>

                    <select
                        name="question_type"
                        required
                        style="width: 100%; padding: 12px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); outline: none; font-family: 'DM Sans', sans-serif;"
                    >
                        <option value="theoretical">Theoretical</option>
                        <option value="numerical">Numerical</option>
                        <option value="both" selected>Both</option>
                    </select>

                </div>

                <button
                    class="btn btn-primary"
                    type="submit"
                >
                    Generate AI Exam
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
