<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — AI Exam Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --border:#1f2d45; --accent:#3b82f6; --text:#f1f5f9; --muted:#64748b; --danger:#ef4444; }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%); bottom:-200px; right:-150px; pointer-events:none; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; position:relative; z-index:1; }
        .back { display:flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted); font-size:13px; margin-bottom:28px; transition:color .2s; }
        .back:hover { color:var(--text); }
        h1 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:6px; }
        .sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
        .alert-error { padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:20px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); color:#fca5a5; display:flex; align-items:center; gap:8px; }
        .form-group { margin-bottom:18px; }
        label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px; }
        .input-wrap { position:relative; }
        .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; }
        input { width:100%; padding:12px 14px 12px 40px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; }
        input:focus { border-color:var(--accent); }
        .hint { font-size:11px; color:var(--muted); margin-top:5px; }
        .btn { width:100%; padding:13px; border-radius:10px; background:var(--accent); color:white; font-size:15px; font-weight:600; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .2s; margin-top:8px; }
        .btn:hover { background:#2563eb; }
        .footer-link { text-align:center; margin-top:24px; font-size:13px; color:var(--muted); }
        .footer-link a { color:var(--accent); text-decoration:none; font-weight:500; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <a href="/" class="back"><i class="fa-solid fa-arrow-left"></i> Back to home</a>

        {% if error %}
        <div class="alert-error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <h1>Create Account</h1>
        <p class="sub">Join and start analyzing your performance</p>

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="hint" id="password-hint">Use at least 8 characters. Add uppercase, numbers & special symbols.</div>
            </div>
            <button type="submit" id="submit-btn" class="btn">Create Account <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const passwordHint = document.getElementById('password-hint');
        const submitBtn = document.getElementById('submit-btn');

        passwordInput.addEventListener('input', function() {
            const val = passwordInput.value;
            if (val.length === 0) {
                passwordHint.textContent = 'Use at least 8 characters. Add uppercase, numbers & special symbols.';
                passwordHint.style.color = 'var(--muted)';
                submitBtn.disabled = false;
                return;
            }

            const hasUpper = /[A-Z]/.test(val);
            const hasLower = /[a-z]/.test(val);
            const hasNum = /[0-9]/.test(val);
            const hasSpec = /[^A-Za-z0-9]/.test(val);
            const isLong = val.length >= 8;

            let strength = 0;
            if (hasUpper) strength++;
            if (hasLower) strength++;
            if (hasNum) strength++;
            if (hasSpec) strength++;
            if (isLong) strength++;

            if (strength <= 2) {
                passwordHint.innerHTML = 'Weak password. Hint: Try something like <strong>Ex@mple123</strong>';
                passwordHint.style.color = 'var(--danger)';
            } else if (strength <= 4) {
                passwordHint.innerHTML = 'Medium password. Add uppercase, numbers or special characters to make it stronger.';
                passwordHint.style.color = '#eab308'; // yellow
            } else {
                passwordHint.innerHTML = 'Strong password! <i class="fa-solid fa-check"></i>';
                passwordHint.style.color = 'var(--accent)'; // using the success/accent color
            }
        });
    </script>
</body>
</html>
