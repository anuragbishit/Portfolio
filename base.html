<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Exam Analyzer{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --bg:       #0b0f1a;
            --surface:  #111827;
            --surface2: #1a2235;
            --border:   #1f2d45;
            --accent:   #3b82f6;
            --accent2:  #6366f1;
            --success:  #10b981;
            --danger:   #ef4444;
            --warn:     #f59e0b;
            --text:     #f1f5f9;
            --muted:    #64748b;
            --sidebar-w: 260px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 28px 20px;
            z-index: 100;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 36px;
        }
        .sidebar-logo .logo-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .sidebar-logo span {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 16px; line-height: 1.2;
        }
        .sidebar-logo small { font-size: 11px; color: var(--muted); font-weight: 400; }
        .nav-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--muted); margin: 16px 8px 8px;
        }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 14px; border-radius: 10px;
            text-decoration: none; color: var(--muted);
            font-size: 14px; font-weight: 500;
            transition: all .2s; margin-bottom: 2px;
        }
        .nav-link:hover { background: var(--surface2); color: var(--text); }
        .nav-link.active { background: rgba(59,130,246,.15); color: var(--accent); }
        .nav-link i { width: 18px; text-align: center; }
        .sidebar-bottom { margin-top: auto; }
        .user-pill {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; border-radius: 12px; background: var(--surface2);
            margin-bottom: 10px;
        }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
            flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-info .uname { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info .urole { font-size: 11px; color: var(--muted); }
        .logout-link {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 10px;
            text-decoration: none; color: var(--danger);
            font-size: 13px; font-weight: 500; transition: background .2s;
        }
        .logout-link:hover { background: rgba(239,68,68,.1); }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            padding: 32px 36px;
        }
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 28px; font-weight: 800; }
        .page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

        /* ── CARDS ── */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 22px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .stat-card .icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .stat-card .val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
        .stat-card .lbl { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
        .icon-blue   { background: rgba(59,130,246,.15);  color: var(--accent);  }
        .icon-green  { background: rgba(16,185,129,.15);  color: var(--success); }
        .icon-purple { background: rgba(99,102,241,.15);  color: var(--accent2); }
        .icon-amber  { background: rgba(245,158,11,.15);  color: var(--warn);    }

        /* ── PANELS ── */
        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }
        .panel-title {
            font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .panel-title i { color: var(--accent); }

        /* ── TABLE ── */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase;
             letter-spacing: .5px; padding: 8px 12px; text-align: left; }
        td { padding: 12px; border-top: 1px solid var(--border); }
        .badge {
            display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-green  { background: rgba(16,185,129,.15);  color: var(--success); }
        .badge-amber  { background: rgba(245,158,11,.15);  color: var(--warn);    }
        .badge-red    { background: rgba(239,68,68,.15);   color: var(--danger);  }
        .badge-blue   { background: rgba(59,130,246,.15);  color: var(--accent);  }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 10px; font-size: 14px;
            font-weight: 600; text-decoration: none; cursor: pointer;
            border: none; font-family: 'DM Sans', sans-serif; transition: all .2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: var(--danger); color: white; }

        /* ── ALERTS ── */
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .alert-error   { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.3);   color: #fca5a5; }
        .alert-success { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.3);  color: #6ee7b7; }

        /* ── FORMS ── */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
        input[type=text], input[type=email], input[type=password] {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color .2s;
        }
        input:focus { border-color: var(--accent); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 20px; }
            .stat-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 500px) { .stat-grid { grid-template-columns: 1fr; } }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
