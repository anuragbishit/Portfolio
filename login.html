<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Exam Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg:#0b0f1a; --surface:#111827; --surface2:#1a2235; --border:#1f2d45; --accent:#3b82f6; --text:#f1f5f9; --muted:#64748b; --danger:#ef4444; --success:#10b981; }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(59,130,246,.1) 0%,transparent 70%); top:-150px; left:-150px; pointer-events:none; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; position:relative; z-index:1; }
        .back { display:flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted); font-size:13px; margin-bottom:28px; transition:color .2s; }
        .back:hover { color:var(--text); }
        h1 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:6px; }
        .sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
        .alert { padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .alert-error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.25);  color:#fca5a5; }
        .alert-success { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#6ee7b7; }
        .form-group { margin-bottom:18px; }
        label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px; }
        .input-wrap { position:relative; }
        .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; }
        input { width:100%; padding:12px 14px 12px 40px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:13px; border-radius:10px; background:var(--accent); color:white; font-size:15px; font-weight:600; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .2s; margin-top:8px; }
        .btn:hover { background:#2563eb; }
        .footer-link { text-align:center; margin-top:24px; font-size:13px; color:var(--muted); }
        .footer-link a { color:var(--accent); text-decoration:none; font-weight:500; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <a href="/" class="back"><i class="fa-solid fa-arrow-left"></i> Back to home</a>

        {% if success == '1' %}
        <div class="alert alert-success"><i class="fa-solid fa-check-circle"></i> Account created! Please login.</div>
        {% elif success == '2' %}
        <div class="alert alert-success"><i class="fa-solid fa-check-circle"></i> Password reset successfully! Please login.</div>
        {% endif %}
        {% if error %}
        <div class="alert alert-error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <h1>Welcome back</h1>
        <p class="sub">Sign in to your student account</p>

        <form method="POST" action="?mode={{ mode }}">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="/forgot_password" style="font-size: 13px; color: var(--accent); text-decoration: none;">Forgot Password?</a>
                </div>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" placeholder="Your password" required>
                </div>
            </div>
            <button type="submit" class="btn">Login <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>
</body>
</html>
